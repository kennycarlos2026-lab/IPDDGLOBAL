# ============================================================
# IPDD — Daily Sync: Supabase Storage → Google Drive
# Se ejecuta cada día a las 3:00 AM (hora de Brasilia = 6:00 UTC)
# También se puede ejecutar manualmente desde Actions > Run workflow
# ============================================================

name: Sync Files to Google Drive

on:
  schedule:
    - cron: '0 6 * * *'   # 6:00 UTC = 3:00 AM BRT todos los días
  workflow_dispatch:        # Permite ejecución manual desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sync-drive/package-lock.json

      - name: Install dependencies
        working-directory: sync-drive
        run: npm ci

      - name: Run sync
        working-directory: sync-drive
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: npm run sync
